
  version: "3.9"

  volumes:
    postgres-data:
    react-dist:

  services:

    # PostgreSQL
    postgres:
      image: postgres:16

      container_name: postgres

      restart: always

      environment:
        POSTGRES_DB: mydb
        POSTGRES_USER: kogo
        POSTGRES_PASSWORD: math1106

      ports:
        - "5432:5432"

      volumes:
        - postgres-data:/var/lib/postgresql/data

    # React Build
    frontend:
      build:
        context: ./frontend

      container_name: frontend

      volumes:
        - react-dist:/dist

      command: >
        sh -c "
        npm ci &&
        npm run build &&
        cp -r dist/. /dist
        "

    # Django Backend
    backend:
      build:
        context: ./backend

      container_name: backend

      restart: always

      ports:
        - "8000:8000"

      depends_on:
        - postgres

      environment:
        DB_NAME: mydb
        DB_USER: kogo
        DB_PASSWORD: math1106
        DB_HOST: postgres
        DB_PORT: 5432

      command: >
        sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000
        "

    # Nginx
    nginx:
      build:
        context: ./nginx

      container_name: nginx

      restart: always

      ports:
        - "80:80"

      depends_on:
        - frontend
        - backend

      volumes:
        - react-dist:/usr/share/nginx/html

